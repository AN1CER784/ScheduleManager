{% if form.non_field_errors %}
<div class="notification-stack">
	<div class="notice notice-danger">
		<div class="notice-bar"></div>
		<div class="notice-message">{{ form.non_field_errors }}</div>
		<button type="button" class="notice-close" aria-label="Close">?</button>
	</div>
</div>
{% endif %}

<div class="notification-stack" id="notification-stack">
	{% if messages %}
		{% for message in messages %}
			<div class="notice notice-{{ message.tags|default:'success' }}">
				<div class="notice-bar"></div>
				<div class="notice-message">{{ message }}</div>
				<button type="button" class="notice-close" aria-label="Close">?</button>
			</div>
		{% endfor %}
	{% endif %}
</div>
